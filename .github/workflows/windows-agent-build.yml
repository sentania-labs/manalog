name: Windows Agent Build

on:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-agent:
    runs-on: windows-latest
    # Elevated so tag builds can attach the exe to the Release. On PRs the
    # job only uploads an artifact, so the elevated token is unused.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          pip install -r agent/requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name MTGOMatchTracker agent/main.py

      - name: Generate checksum
        run: certutil -hashfile dist\MTGOMatchTracker.exe SHA256 > dist\MTGOMatchTracker.exe.sha256

      - name: Upload artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent
          path: dist/MTGOMatchTracker.exe
          retention-days: 30

      - name: Attach to release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/MTGOMatchTracker.exe
            dist/MTGOMatchTracker.exe.sha256
